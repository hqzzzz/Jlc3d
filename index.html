<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://lceda.cn https://pro.lceda.cn https://modules.lceda.cn;">
  <title>嘉立创 3D 模型下载器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-title">嘉立创 3D 模型下载器</div>
    <div class="titlebar-controls">
      <button id="minimizeBtn" class="titlebar-btn" title="最小化">−</button>
      <button id="closeBtn" class="titlebar-btn close" title="关闭">✕</button>
    </div>
  </div>

  <div class="container">
    <div class="title-section">
      <h1>嘉立创 3D 模型下载器</h1>
    </div>

    <div class="input-section">
      <label for="codeInput">元器件编号:</label>
      <input type="text" id="codeInput" placeholder="例如：C8734" value="C8734">
      <button id="queryBtn" class="btn-primary">查询</button>
      <button id="modelDownloadBtn" class="btn-primary btn-download-only">下载 3D 模型</button>
      <button id="aboutBtn" class="btn-secondary">关于</button>
    </div>

    <div id="resultSection" class="result-section" style="display: none;">
      <div class="result-header">查询结果</div>
      <div class="two-column-preview">
        <div class="preview-column">
          <div class="column-header">引脚图</div>
          <div class="column-content">
            <div id="schematicContainer" class="eda-container"></div>
          </div>
        </div>
        <div class="preview-column">
          <div class="column-header">焊盘图</div>
          <div class="column-content">
            <div id="pcbContainer" class="eda-container"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="log-section">
      <div class="log-header">操作记录</div>
      <div id="logContainer" class="log-content"></div>
    </div>
  </div>

  <div id="aboutDialog" class="dialog-overlay" style="display: none;">
    <div class="dialog-content">
      <div class="dialog-header">
        <h2>关于</h2>
        <button class="dialog-close" id="closeAboutBtn">&times;</button>
      </div>
      <div class="dialog-body">
        <p><strong>嘉立创 3D 模型下载器</strong></p>
        <p>版本：1.3.0</p>
        <p>作者：Jupiter</p>
        <p>项目地址：</p>
        <a href="https://github.com/zhutongxueya/JLC3DDownload" target="_blank" id="githubLink">https://github.com/zhutongxueya/JLC3DDownload</a>
        <p class="credit">感谢 kulya97 的原始思路</p>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
